name: vinnutri_ai
description: "A premium AI-powered nutrition and fitness tracking app for Vietnamese food."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # ✨ AI & Web Service
  google_generative_ai: ^0.4.4
  http: ^1.2.2
  
  # 📊 UI & Charts
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  
  # 📷 Imaging
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  
  # Monitoring & Sensors
  pedometer: ^4.0.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.3
  geolocator: ^11.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
